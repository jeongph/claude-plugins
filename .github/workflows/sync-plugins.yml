name: Sync plugin SHAs

on:
  schedule:
    - cron: '0 15 * * *'  # 매일 KST 00:00 (UTC 15:00)
  workflow_dispatch:       # 수동 트리거도 가능

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update plugin SHAs
        run: |
          MARKETPLACE=".claude-plugin/marketplace.json"
          CHECKSUM_BEFORE=$(sha256sum "$MARKETPLACE" | awk '{print $1}')

          PLUGIN_COUNT=$(jq '.plugins | length' "$MARKETPLACE")
          for i in $(seq 0 $((PLUGIN_COUNT - 1))); do
            NAME=$(jq -r ".plugins[$i].name" "$MARKETPLACE")
            URL=$(jq -r ".plugins[$i].source.url" "$MARKETPLACE")
            OLD_SHA=$(jq -r ".plugins[$i].source.sha" "$MARKETPLACE")

            NEW_SHA=$(git ls-remote "$URL" HEAD | awk '{print $1}')

            if [ -n "$NEW_SHA" ] && [ "$OLD_SHA" != "$NEW_SHA" ]; then
              jq --arg idx "$i" --arg sha "$NEW_SHA" \
                '.plugins[$idx | tonumber].source.sha = $sha' \
                "$MARKETPLACE" > tmp.json && mv tmp.json "$MARKETPLACE"
              echo "Updated $NAME: $OLD_SHA -> $NEW_SHA"
            else
              echo "No change: $NAME"
            fi
          done

          CHECKSUM_AFTER=$(sha256sum "$MARKETPLACE" | awk '{print $1}')
          if [ "$CHECKSUM_BEFORE" != "$CHECKSUM_AFTER" ]; then
            echo "updated=true" >> "$GITHUB_OUTPUT"
          else
            echo "updated=false" >> "$GITHUB_OUTPUT"
          fi
        id: check

      - name: Commit and push
        if: steps.check.outputs.updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json
          git commit -m "chore: 플러그인 SHA 자동 갱신"
          git push
